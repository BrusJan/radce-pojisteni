services:
  backend:
    build:
      context: ./backend
    container_name: insurance-advisor-backend
    environment:
      BACKEND_PORT: ${BACKEND_PORT:-8080}
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS:-*}
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-insurance_advisor}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-insurance_app}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-insurance_password}
    depends_on:
      - db
    ports:
      - "127.0.0.1:${BACKEND_PORT:-8080}:8080"
    restart: unless-stopped

  db:
    image: pgvector/pgvector:pg16
    container_name: insurance-advisor-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-insurance_advisor}
      POSTGRES_USER: ${POSTGRES_USER:-insurance_app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-insurance_password}
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./backend/db/init:/docker-entrypoint-initdb.d
    restart: unless-stopped

volumes:
  db_data:
