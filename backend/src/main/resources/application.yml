server:
  port: ${BACKEND_PORT:8080}

spring:
  application:
    name: insurance-advisor-backend
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/insurance_advisor}
    username: ${SPRING_DATASOURCE_USERNAME:insurance_app}
    password: ${SPRING_DATASOURCE_PASSWORD:insurance_password}

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:*}
